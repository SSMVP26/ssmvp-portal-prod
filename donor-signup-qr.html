<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donor Sign-up QR • Vadtaldham Perth</title>
<style>
  body { margin:0; background:#fff; font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif; color:#1e293b; }
  .poster { max-width:560px; margin:0 auto; padding:48px 32px; text-align:center; }
  .sub { font-size:13px; letter-spacing:3px; text-transform:uppercase; color:#8B1A1A; font-weight:700; }
  h1 { font-size:30px; font-weight:900; margin:6px 0 4px; }
  .tag { color:#475569; font-size:16px; margin-bottom:28px; }
  .qrbox { display:inline-block; padding:18px; border:3px solid #8B1A1A; border-radius:24px; }
  .qrbox img { display:block; width:300px; height:300px; }
  .scan { margin-top:24px; font-size:22px; font-weight:800; }
  .steps { color:#475569; font-size:15px; margin-top:8px; line-height:1.7; }
  .jai { margin-top:26px; font-weight:700; color:#8B1A1A; }
  .url { margin-top:18px; font-size:12px; color:#94a3b8; word-break:break-all; }
  .noprint { margin-top:26px; }
  button { background:#8B1A1A; color:#fff; border:none; padding:12px 28px; border-radius:12px; font-weight:700; cursor:pointer; }
  @media print { .noprint { display:none; } .poster { padding:24px; } }
</style>
</head>
<body>
<div class="poster">
  <div class="sub">Shree Swaminarayan Mandir</div>
  <h1>Vadtaldham Perth</h1>
  <div class="tag">Become a registered donor</div>
  <div class="qrbox">
    <img alt="Scan to register as a donor"
         src="https://api.qrserver.com/v1/create-qr-code/?size=600x600&margin=8&data=https%3A%2F%2Fssmvp26.github.io%2Fssmvp-portal-prod%2Fdonor-signup.html">
  </div>
  <div class="scan">📱 Scan to register</div>
  <div class="steps">Point your phone camera at the code,<br>tap the link, and fill in your details.</div>
  <div class="jai">Jay Shree Swaminarayan</div>
  <div class="url">https://ssmvp26.github.io/ssmvp-portal-prod/donor-signup.html</div>
  <div class="noprint"><button onclick="window.print()">🖨 Print this poster</button></div>
</div>
</body>
</html>
